<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Panel · Villa Cobo</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500&family=Archivo:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{ --verde:#1E2A1E; --verde-mid:#36402F; --oro:#B89A4E; --oro-soft:rgba(184,154,78,.6); --marfil:#F3F0E6; --gris-soft:#8C8674; }
    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Archivo',sans-serif; background:var(--verde); color:var(--marfil); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    a{ color:inherit; }
    .card{ width:100%; max-width:520px; background:rgba(243,240,230,.04); border:1px solid rgba(184,154,78,.2); padding:40px 36px; }
    .brand{ text-align:center; margin-bottom:28px; }
    .brand .v{ font-weight:200; letter-spacing:.5em; font-size:10px; text-transform:uppercase; color:var(--oro); padding-left:.5em; }
    .brand .c{ font-family:'Bodoni Moda',serif; font-size:34px; letter-spacing:.1em; text-transform:uppercase; line-height:1; }
    .brand .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--gris-soft); margin-top:10px; }

    .label{ font-size:9px; font-weight:300; letter-spacing:.32em; text-transform:uppercase; color:var(--gris-soft); display:block; margin-bottom:8px; }
    input[type=password],input[type=email]{ width:100%; background:rgba(243,240,230,.06); border:1px solid rgba(243,240,230,.18); color:var(--marfil); padding:14px 16px; font-family:'Archivo'; font-size:14px; outline:none; transition:border-color .2s; }
    input[type=password]:focus,input[type=email]:focus{ border-color:var(--oro); }
    .btn{ width:100%; margin-top:18px; background:var(--oro); border:1px solid var(--oro); color:var(--verde); padding:15px; font-family:'Archivo'; font-size:11px; font-weight:400; letter-spacing:.3em; text-transform:uppercase; cursor:pointer; transition:background .2s; }
    .btn:hover{ background:#C7BFAC; }
    .btn:disabled{ opacity:.5; cursor:default; }
    .msg{ margin-top:14px; font-size:12px; font-weight:300; min-height:18px; text-align:center; }
    .msg.err{ color:#E0A0A0; }
    .msg.ok{ color:var(--oro); }

    #panel{ display:none; }
    .cal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .cal-title{ font-family:'Bodoni Moda',serif; font-size:18px; letter-spacing:.08em; text-transform:uppercase; }
    .cal-btn{ background:none; border:1px solid var(--oro-soft); color:var(--oro); width:34px; height:34px; cursor:pointer; font-size:15px; }
    .cal-btn:hover{ background:rgba(184,154,78,.15); }
    .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; text-align:center; }
    .dn{ font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:rgba(243,240,230,.35); padding:6px 0; }
    .day{ padding:12px 0; font-size:13px; font-weight:300; cursor:pointer; border:1px solid transparent; border-radius:2px; transition:.15s; user-select:none; }
    .day:hover:not(.past):not(.empty){ border-color:var(--oro-soft); }
    .day.past{ opacity:.2; cursor:default; }
    .day.empty{ cursor:default; }
    .day.blocked{ background:var(--oro); color:var(--verde); font-weight:400; }
    .day.saving{ opacity:.4; cursor:wait; }
    .legend{ display:flex; gap:22px; justify-content:center; margin-top:18px; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--gris-soft); }
    .legend span{ display:flex; align-items:center; gap:7px; }
    .legend i{ width:12px; height:12px; border-radius:2px; display:inline-block; }
    .legend .free{ border:1px solid var(--oro-soft); }
    .legend .occ{ background:var(--oro); }
    .hint{ font-size:11px; font-weight:300; color:var(--gris-soft); line-height:1.7; text-align:center; margin-top:22px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .logout{ font-size:9px; letter-spacing:.25em; text-transform:uppercase; color:var(--gris-soft); cursor:pointer; background:none; border:none; }
    .logout:hover{ color:var(--oro); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="v">Villa</div>
      <div class="c">Cobo</div>
      <div class="sub">Panel de disponibilidad</div>
    </div>

    <!-- LOGIN -->
    <div id="login">
      <label class="label" for="email">Email</label>
      <input type="email" id="email" placeholder="info@villacobo.es" autocomplete="username" value="info@villacobo.es">
      <label class="label" for="pass" style="margin-top:16px;">Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
      <button class="btn" id="enter">Entrar</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- PANEL -->
    <div id="panel">
      <div class="topbar">
        <span class="label" style="margin:0;">Bloquea las fechas ocupadas</span>
        <button class="logout" id="logout">Salir</button>
      </div>
      <div class="cal-head">
        <button class="cal-btn" id="prev">‹</button>
        <span class="cal-title" id="mlabel"></span>
        <button class="cal-btn" id="next">›</button>
      </div>
      <div class="cal-grid" id="grid"></div>
      <div class="legend">
        <span><i class="free"></i> Libre</span>
        <span><i class="occ"></i> Ocupado</span>
      </div>
      <div class="msg" id="panelMsg"></div>
      <p class="hint">Toca un día para marcarlo <b>Ocupado</b> o liberarlo.<br>Lo que bloquees aquí aparece como no disponible en villacobo.es.</p>
      <div style="margin-top:22px; border-top:1px solid rgba(184,154,78,.15); padding-top:16px; text-align:center;">
        <button class="logout" id="showcp">Cambiar contraseña</button>
        <div id="cp" style="display:none; margin-top:14px; text-align:left;">
          <label class="label" for="cpNew">Nueva contraseña</label>
          <input type="password" id="cpNew" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          <button class="btn" id="cpSave">Guardar contraseña</button>
          <div class="msg" id="cpMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SB_URL = 'https://pxvgambejvesosplgibb.supabase.co';
    const SB_KEY = 'sb_publishable_h0iKwibrHL5ZOigyKx9nJQ_fdj5g0uj';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const DAYS=['L','M','X','J','V','S','D'];
    const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    let EMAIL='', PASS='', current=new Date(), blocked=new Set();

    function key(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

    async function loadBlocked(){
      const { data, error } = await sb.from('blocked_dates').select('d');
      blocked = new Set((data||[]).map(r=>r.d));
      render();
    }

    function render(){
      const y=current.getFullYear(), m=current.getMonth();
      document.getElementById('mlabel').textContent = `${MONTHS[m]} ${y}`;
      const grid=document.getElementById('grid');
      grid.innerHTML = DAYS.map(d=>`<div class="dn">${d}</div>`).join('');
      const first=new Date(y,m,1).getDay(); const offset=first===0?6:first-1;
      const days=new Date(y,m+1,0).getDate();
      const today=new Date(); today.setHours(0,0,0,0);
      for(let i=0;i<offset;i++) grid.innerHTML+=`<div class="day empty"></div>`;
      for(let i=1;i<=days;i++){
        const k=key(y,m,i); const date=new Date(y,m,i);
        let cls='day'; if(date<today) cls+=' past'; if(blocked.has(k)) cls+=' blocked';
        grid.innerHTML+=`<div class="${cls}" data-k="${k}">${i}</div>`;
      }
      grid.querySelectorAll('.day:not(.past):not(.empty)').forEach(el=>{
        el.addEventListener('click', ()=>toggle(el));
      });
    }

    async function toggle(el){
      const k=el.dataset.k; const willBlock=!blocked.has(k);
      el.classList.add('saving');
      const { error } = await sb.rpc('panel_toggle', { p_email:EMAIL, p_pass:PASS, p_date:k, p_block:willBlock });
      el.classList.remove('saving');
      const msg=document.getElementById('panelMsg');
      if(error){ msg.textContent='Error al guardar. Inténtalo de nuevo.'; msg.className='msg err'; return; }
      if(willBlock) blocked.add(k); else blocked.delete(k);
      el.classList.toggle('blocked', willBlock);
      msg.textContent = willBlock ? 'Fecha marcada como ocupada ✓' : 'Fecha liberada ✓';
      msg.className='msg ok';
      setTimeout(()=>{ msg.textContent=''; }, 1800);
    }

    async function enter(){
      const btn=document.getElementById('enter'), msg=document.getElementById('loginMsg');
      const em=(document.getElementById('email').value||'').trim();
      const p=document.getElementById('pass').value;
      if(!em || !p){ msg.textContent='Introduce email y contraseña.'; msg.className='msg err'; return; }
      btn.disabled=true; btn.textContent='Entrando...'; msg.textContent='';
      const { data, error } = await sb.rpc('panel_login', { p_email:em, p_pass:p });
      btn.disabled=false; btn.textContent='Entrar';
      if(error){ msg.textContent='Error de conexión.'; msg.className='msg err'; return; }
      if(data===true){
        EMAIL=em; PASS=p;
        document.getElementById('login').style.display='none';
        document.getElementById('panel').style.display='block';
        loadBlocked();
      } else {
        msg.textContent='Email o contraseña incorrectos.'; msg.className='msg err';
      }
    }

    async function changePass(){
      const np=document.getElementById('cpNew').value, msg=document.getElementById('cpMsg'), btn=document.getElementById('cpSave');
      if(!np || np.length<6){ msg.textContent='Mínimo 6 caracteres.'; msg.className='msg err'; return; }
      btn.disabled=true; btn.textContent='Guardando...';
      const { data, error } = await sb.rpc('panel_change_pass', { p_email:EMAIL, p_pass:PASS, p_new:np });
      btn.disabled=false; btn.textContent='Guardar contraseña';
      if(error || data!==true){ msg.textContent='No se pudo cambiar.'; msg.className='msg err'; return; }
      PASS=np; document.getElementById('cpNew').value='';
      msg.textContent='Contraseña actualizada ✓'; msg.className='msg ok';
      setTimeout(()=>{ msg.textContent=''; document.getElementById('cp').style.display='none'; }, 2200);
    }

    document.getElementById('enter').addEventListener('click', enter);
    document.getElementById('pass').addEventListener('keydown', e=>{ if(e.key==='Enter') enter(); });
    document.getElementById('email').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('pass').focus(); });
    document.getElementById('showcp').addEventListener('click', ()=>{ const c=document.getElementById('cp'); c.style.display = c.style.display==='none'?'block':'none'; });
    document.getElementById('cpSave').addEventListener('click', changePass);
    document.getElementById('prev').addEventListener('click', ()=>{ current.setMonth(current.getMonth()-1); render(); });
    document.getElementById('next').addEventListener('click', ()=>{ current.setMonth(current.getMonth()+1); render(); });
    document.getElementById('logout').addEventListener('click', ()=>{ PASS=''; location.reload(); });
  </script>
</body>
</html>
